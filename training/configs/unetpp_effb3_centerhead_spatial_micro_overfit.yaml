seed: 1337

dataset:
  root: datasets/converted_leaflet_distance
  train_txt: datasets/converted_leaflet_distance/train.txt
  val_txt: datasets/converted_leaflet_distance/val.txt
  test_txt: datasets/converted_leaflet_distance/test.txt
  instance_root: datasets/converted_leaflet_instances

model:
  encoder_name: efficientnet-b3
  encoder_weights: null
  in_channels: 3
  classes: 3
  input_size: 768
  center_head_type: spatial_dilated
  center_head_init_bias: -2.19

loss:
  ce_class_weights:
    - 0.2
    - 1.0
    - 2.5
  ce_coef: 0.3
  dice_coef: 0.7

center:
  lambda: 1.0
  marker_thr: 0.3
  pos_weight: 1000.0
  pos_weight_thr: 0.5
  pos_weight_max: 1000.0

center_loss:
  type: centernet_focal
  alpha: 2.0
  beta: 4.0

augment:
  rotate90: false
  hflip: false
  vflip: false
  brightness_contrast: false
  gamma: false

train:
  save_dir: training/runs/unetpp_effb3_centerhead_spatial_micro_overfit
  init_checkpoint: training/runs/unetpp_effb3_a100_multiclass_curated_finetune_stage2_lr1e5_100ep/best_mean_fg.pth
  epochs: 1
  batch_size: 6
  lr: 0.001
  lr_backbone: 0.00001
  lr_center_head: 0.001
  center_grad_clip_norm: 5.0
  weight_decay: 0.0
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2
  amp: false
  log_every: 25
  smoke_steps: 1
  freeze_base: true
