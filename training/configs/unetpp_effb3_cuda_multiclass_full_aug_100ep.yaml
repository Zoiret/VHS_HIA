seed: 1337

dataset:
  root: datasets/converted_full_multiclass_aug
  train_txt: datasets/converted_full_multiclass_aug/train.txt
  val_txt: datasets/converted_full_multiclass_aug/val.txt
  test_txt: datasets/converted_full_multiclass_aug/test.txt

model:
  name: unetplusplus
  architecture: UnetPlusPlus
  encoder_name: efficientnet-b3
  encoder_weights: null
  in_channels: 3
  classes: 3
  input_size: 768
  init_from_checkpoint: null
  init_ignore_mismatched: true

loss:
  ce_class_weights:
    - 0.2
    - 1.0
    - 2.5
  ce_coef: 0.3
  dice_coef: 0.7

augment:
  rotate90: false
  hflip: false
  vflip: false
  brightness_contrast: false
  gamma: false

scheduler:
  type: reduce_on_plateau
  monitor: mean_dice_fg
  mode: max
  factor: 0.5
  patience: 8
  min_lr: 0.00003

early_stopping:
  monitor: mean_dice_fg
  mode: max
  patience: 20

train:
  save_dir: training/runs/unetpp_effb3_cuda_multiclass_full_aug_100ep
  epochs: 100
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.00001
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  amp: true
  cudnn_benchmark: true
  log_every: 10
  dry_run_steps: 2
